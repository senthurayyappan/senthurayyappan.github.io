services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: likes
      POSTGRES_USER: likes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - likes-postgres:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://likes:${POSTGRES_PASSWORD}@database:5432/likes
      VISITOR_SALT: ${VISITOR_SALT}
      ALLOWED_ORIGIN: https://senthurayyappan.com
    depends_on:
      - database
    ports:
      - "127.0.0.1:8791:8787"

volumes:
  likes-postgres:
